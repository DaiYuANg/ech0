<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ech0 Broker Console{% endblock %}</title>
  <script>
    if (localStorage.getItem("ech0-theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
    tailwind = window.tailwind || {};
    tailwind.config = {
      darkMode: "class"
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-slate-950 dark:text-slate-100">
  <div class="min-h-screen lg:grid lg:grid-cols-[16rem_1fr]">
    <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden bg-slate-900/50 lg:hidden" aria-hidden="true"></div>
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 -translate-x-full border-r border-slate-200 bg-white transition-transform duration-200 ease-out dark:border-slate-800 dark:bg-slate-900 lg:static lg:w-auto lg:translate-x-0" aria-hidden="true">
      <div class="border-b border-slate-200 px-5 py-4 dark:border-slate-800">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">ech0</p>
        <h1 class="mt-1 text-lg font-bold text-slate-900 dark:text-slate-100">Broker Console</h1>
      </div>
      <nav class="space-y-1 p-3">
        <a data-nav="dashboard" href="/ui" class="block rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">Dashboard</a>
        <a data-nav="topics" href="/ui/topics" class="block rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">Topics</a>
        <a data-nav="group" href="/ui/groups/orders-cg" class="block rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">Group Detail</a>
        <a data-nav="metrics" href="/metrics" class="block rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">Prometheus Metrics</a>
        <a data-nav="healthz" href="/healthz" class="block rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">Healthz</a>
      </nav>
      <div class="border-y border-slate-200 p-3 dark:border-slate-800">
        <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Quick Group Jump</p>
        <form id="group-jump-form" class="flex items-center gap-2">
          <input id="group-jump-input" type="text" value="{% block group_jump_default %}orders-cg{% endblock %}" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm text-slate-800 outline-none ring-blue-500 focus:ring-2 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100" />
          <button type="submit" class="rounded-md bg-blue-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-blue-700">Go</button>
        </form>
      </div>
      <div class="p-3">
        <button id="theme-toggle-btn" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">Toggle Theme</button>
      </div>
    </aside>

    <main class="p-4 sm:p-6 lg:p-8">
      <div class="mb-4 flex items-center justify-between rounded-lg border border-slate-200 bg-white px-3 py-2 dark:border-slate-800 dark:bg-slate-900 lg:hidden">
        <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">ech0 Console</p>
        <button id="sidebar-toggle-btn" type="button" aria-label="Toggle navigation menu" aria-controls="sidebar" aria-expanded="false" class="rounded-md border border-slate-300 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">Menu</button>
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    const jumpForm = document.getElementById("group-jump-form");
    const jumpInput = document.getElementById("group-jump-input");
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebar-overlay");
    const sidebarToggleButton = document.getElementById("sidebar-toggle-btn");

    function closeSidebar() {
      sidebar.classList.add("-translate-x-full");
      sidebarOverlay.classList.add("hidden");
      sidebar.setAttribute("aria-hidden", "true");
      if (sidebarToggleButton) {
        sidebarToggleButton.setAttribute("aria-expanded", "false");
      }
    }

    function openSidebar() {
      sidebar.classList.remove("-translate-x-full");
      sidebarOverlay.classList.remove("hidden");
      sidebar.setAttribute("aria-hidden", "false");
      if (sidebarToggleButton) {
        sidebarToggleButton.setAttribute("aria-expanded", "true");
      }
    }

    if (sidebarToggleButton) {
      sidebarToggleButton.addEventListener("click", function () {
        const isOpen = !sidebar.classList.contains("-translate-x-full");
        if (isOpen) closeSidebar();
        else openSidebar();
      });
    }

    function syncSidebarForViewport() {
      if (window.innerWidth >= 1024) {
        sidebarOverlay.classList.add("hidden");
        sidebar.classList.remove("-translate-x-full");
        sidebar.setAttribute("aria-hidden", "false");
        if (sidebarToggleButton) {
          sidebarToggleButton.setAttribute("aria-expanded", "true");
        }
      } else {
        closeSidebar();
      }
    }

    sidebarOverlay.addEventListener("click", closeSidebar);
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && window.innerWidth < 1024) {
        closeSidebar();
      }
    });
    window.addEventListener("resize", syncSidebarForViewport);
    syncSidebarForViewport();

    jumpForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const group = jumpInput.value.trim();
      if (!group) return;
      if (window.innerWidth < 1024) closeSidebar();
      window.location.href = "/ui/groups/" + encodeURIComponent(group);
    });

    const currentPath = window.location.pathname;
    let currentNav = "dashboard";
    if (currentPath.startsWith("/ui/topics")) currentNav = "topics";
    else if (currentPath.startsWith("/ui/groups")) currentNav = "group";
    else if (currentPath.startsWith("/metrics")) currentNav = "metrics";
    else if (currentPath.startsWith("/healthz")) currentNav = "healthz";

    document.querySelectorAll("[data-nav]").forEach(function (element) {
      if (element.getAttribute("data-nav") === currentNav) {
        element.classList.add(
          "bg-blue-50",
          "text-blue-700",
          "font-medium",
          "dark:bg-blue-950",
          "dark:text-blue-200"
        );
      }
      element.addEventListener("click", function () {
        if (window.innerWidth < 1024) closeSidebar();
      });
    });

    const themeButton = document.getElementById("theme-toggle-btn");
    themeButton.addEventListener("click", function () {
      const isDark = document.documentElement.classList.toggle("dark");
      localStorage.setItem("ech0-theme", isDark ? "dark" : "light");
    });
  </script>
</body>
</html>
