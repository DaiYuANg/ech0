services:
  ech0-single:
    image: ${ECH0_IMAGE:-ghcr.io/daiyuang/ech0:latest}
    working_dir: /app
    command: ["--config", "/app/config/ech0.toml"]
    restart: unless-stopped
    environment:
      ECH0_BROKER__DATA_DIR: /app/data
    volumes:
      - ./configs/single/ech0.toml:/app/config/ech0.toml:ro
      - ./data/single:/app/data
    ports:
      - "${ECH0_SINGLE_BROKER_PORT:-9090}:9090"
      - "${ECH0_SINGLE_ADMIN_PORT:-9091}:9091"
      - "${ECH0_SINGLE_RAFT_PORT:-3210}:3210"
