services:
  ech0-node1:
    image: ${ECH0_CLUSTER_IMAGE:-ech0:cluster-local}
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${ECH0_BASE_IMAGE:-debian}
    working_dir: /app
    command: ["--config", "/app/config/ech0.toml"]
    restart: unless-stopped
    environment:
      ECH0_BROKER__DATA_DIR: /app/data
    volumes:
      - ./configs/cluster/node1.toml:/app/config/ech0.toml:ro
      - ${ECH0_CLUSTER_DATA_ROOT:-./data/cluster}/node1:/app/data
    ports:
      - "${ECH0_NODE1_BROKER_PORT:-19090}:9090"
      - "${ECH0_NODE1_ADMIN_PORT:-19091}:9091"
      - "${ECH0_NODE1_RAFT_PORT:-13210}:3210"
    expose:
      - "7946/tcp"
      - "7946/udp"

